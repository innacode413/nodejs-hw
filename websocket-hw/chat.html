<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>WebSocket чат</title>
</head>
<body>
  <h2>Простий чат</h2>
  <div id="messages" style="border:1px solid #ccc; height:200px; overflow-y:auto; padding:8px; margin-bottom:8px;"></div>
  <input id="input" type="text" placeholder="Повідомлення..." style="width:70%;">
  <button id="send">Надіслати</button>

  <script>
    const ws = new WebSocket('ws://localhost:8080');

    const messages = document.getElementById('messages');
    const input = document.getElementById('input');
    const button = document.getElementById('send');

    ws.onmessage = (event) => {
      const div = document.createElement('div');
      div.textContent = event.data;
      messages.appendChild(div);
    };

    button.onclick = () => {
      ws.send(input.value);
      input.value = '';
    };
  </script>
</body>
</html>
